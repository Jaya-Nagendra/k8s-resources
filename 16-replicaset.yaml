apiVersion: v1
kind: ReplicaSet
metadata:
  name: nginx
  # these are replicaset labels
  labels:
    project: roboshop
    purpose: rs-demo
    tier: frontend
  spec:
    replicas: 3
    selector:
    # using these labels replica set selects the pod
      matchLabels:
        project: roboshop
        purpose: rs-demo
        tier: frontend

  # the below are pod definition, pod is subset of replicaset
    template:
      metadata:
        labels:
          project: roboshop
          purpose: rs-demo
          tier: frontend
          component: frontend
      spec:
        containers:
        - name: nginx
          image: nginx:stable-alpine3.23-perl      